name: Quartz v5 build (verify)
on:
  push: { branches: [v5] }
  workflow_dispatch:
permissions: { contents: read }
concurrency: { group: quartz-v5-verify, cancel-in-progress: true }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: "22" }
      - uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with: { path: ~/.npm, key: "${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}" }
      - uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with: { path: .quartz/plugins, key: "${{ runner.os }}-qzplugins-${{ hashFiles('quartz.lock.json') }}" }
      - run: npm ci
      - run: npx quartz plugin install
      - run: npx quartz build
      - uses: actions/upload-artifact@v4
        with: { name: quartz-v5-site, path: public, retention-days: 5 }
